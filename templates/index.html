{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Events</h1>
    <a href="{{ url_for('create_event') }}" class="btn btn-primary">Create Event</a>
</div>

<div class="row">
    {% for event in events %}
    <div class="col-md-6 col-lg-4 mb-3">
        <div class="card">
            <div class="card-body">
                <h5 class="card-title">{{ event.title }}</h5>
                <p class="card-text">{{ event.description[:100] }}...</p>
                <p class="text-muted">{{ event.date.strftime('%Y-%m-%d %H:%M') }}</p>
                <a href="{{ url_for('view_event', id=event.id) }}" class="btn btn-outline-primary">View Details</a>
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% endblock %}
